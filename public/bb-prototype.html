  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"75691ce8-4e29-4721-9588-a5b81b81cd4b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4db82f9a-e482-448d-bdff-e7d726b07e5d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b49b0ef3-19db-41ac-9d14-5aa322d6ac35\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Palette ──────────────────────────────────────────────\n   * Deep Teal   #00695c  Mindanao · inland · primary CTA\n   * Coastal Teal #299d8f Visayas · coast · accent / link / highlight\n   * Forest      #2e5e3e  Lush inland · editorial tag\n   * Sand        #d9c6a1  Beach moment · soft surface\n   * Cream       #f4f1ec  Shared ground · default background\n   * Bark        #0e1d1a  Near-black, teal undertone · text\n   * Stone       #a8a293  Cool warm neutral · captions, borders\n   */\n\n  /* Teals — the two regional voices */\n  --deep-teal:         oklch(45% 0.077 188);\n  --deep-teal-hover:   oklch(40% 0.080 188);\n  --coastal-teal:      oklch(63% 0.088 184);\n  --coastal-teal-hover:oklch(58% 0.095 184);\n\n  /* Greens — Mindanao jungle */\n  --forest-700:        oklch(38% 0.070 155);\n\n  /* Sand — Visayas beach */\n  --sand-200:          oklch(88% 0.040  78);\n  --sand-300:          oklch(82% 0.055  76);\n\n  /* Cream — shared ground */\n  --cream-50:          oklch(97% 0.012  85);  /* page bg */\n  --cream-100:         oklch(95% 0.018  82);  /* cards on cream */\n  --cream-200:         oklch(91% 0.025  80);  /* hover bg, dividers */\n\n  /* Mist — pale teal-tinted off-white for alternate sections */\n  --mist-50:           oklch(96% 0.018 188);\n  --mist-100:          oklch(93% 0.025 188);\n\n  /* Bark — cool near-black with teal undertone */\n  --bark-700:          oklch(36% 0.025 185);  /* body text */\n  --bark-800:          oklch(24% 0.022 185);  /* headlines */\n  --bark-900:          oklch(15% 0.018 185);  /* deepest, footer / inverted */\n\n  /* Stone — neutral connector */\n  --stone-400:         oklch(68% 0.014  80);\n\n  /* ── Backwards-compat aliases ─────────────────────────────\n   * v1 tokens that may still appear in older snippets.\n   * These point at the closest v2 equivalents so legacy\n   * styles still render in-system.                            */\n  --terracotta:        var(--deep-teal);\n  --terracotta-hover:  var(--deep-teal-hover);\n  --mango-500:         var(--coastal-teal);\n  --clay-400:          var(--stone-400);\n  --coffee-700:        var(--bark-700);\n  --coffee-800:        var(--bark-800);\n  --coffee-900:        var(--bark-900);\n  --teal-500:          var(--coastal-teal);\n  --forest-600:        var(--forest-700);\n\n  /* ── Semantic ─────────────────────────────────────────── */\n  --bg:            var(--cream-50);\n  --bg-elevated:   var(--cream-100);\n  --bg-mist:       var(--mist-50);          /* breathing alternate */\n  --bg-warm:       var(--sand-200);         /* beach-soft alternate */\n  --bg-inverted:   var(--deep-teal);        /* warm-dark, never near-black */\n  --bg-inverted-alt: var(--forest-700);     /* second warm-dark option */\n  --fg:            var(--bark-800);\n  --fg-muted:      var(--bark-700);\n  --fg-subtle:     color-mix(in oklch, var(--bark-700) 55%, transparent);\n  --fg-on-dark:    var(--cream-50);\n  --accent:        var(--deep-teal);\n  --accent-hover:  var(--deep-teal-hover);\n  --link:          var(--coastal-teal);\n  --tag:           var(--forest-700);\n  --highlight:     var(--coastal-teal);\n  --border:        color-mix(in oklch, var(--bark-700) 14%, transparent);\n  --border-strong: color-mix(in oklch, var(--bark-700) 28%, transparent);\n\n  /* ── Type ─────────────────────────────────────────────── */\n  --font-display: 'Fraunces', 'Iowan Old Style', Georgia, serif;\n  --font-body:    'DM Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   22px;\n  --text-xl:   28px;\n  --text-2xl:  36px;\n  --text-3xl:  48px;\n  --text-4xl:  64px;\n  --text-5xl:  84px;\n\n  --leading-tight: 1.05;\n  --leading-snug:  1.2;\n  --leading-body:  1.55;\n  --leading-loose: 1.75;\n\n  /* ── Spacing (8px base) ──────────────────────────────── */\n  --sp-1: 4px;\n  --sp-2: 8px;\n  --sp-3: 12px;\n  --sp-4: 16px;\n  --sp-5: 24px;\n  --sp-6: 32px;\n  --sp-7: 48px;\n  --sp-8: 64px;\n  --sp-9: 96px;\n\n  /* ── Radii ───────────────────────────────────────────── */\n  --r-sm:  8px;\n  --r-md:  12px;  /* buttons, inputs */\n  --r-lg:  16px;  /* images */\n  --r-xl:  20px;  /* cards */\n  --r-2xl: 24px;  /* hero blocks */\n  --r-pill: 999px;\n\n  /* ── Shadows — cool teal undertone ───────────────────── */\n  --shadow-sm: 0 1px 2px  oklch(36% 0.025 185 / 0.07),\n               0 2px 6px  oklch(36% 0.025 185 / 0.05);\n  --shadow-md: 0 2px 4px  oklch(36% 0.025 185 / 0.08),\n               0 8px 18px oklch(36% 0.025 185 / 0.09);\n  --shadow-lg: 0 4px 8px  oklch(36% 0.025 185 / 0.10),\n               0 18px 40px oklch(36% 0.025 185 / 0.13);\n\n  /* ── Motion ──────────────────────────────────────────── */\n  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);\n  --t-fast: 150ms;\n  --t-base: 200ms;\n  --t-slow: 300ms;\n}\n\n/* ── Base elements ──────────────────────────────────────── */\nhtml, body {\n  background: var(--bg);\n  color: var(--fg);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-body);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 {\n  font-family: var(--font-display);\n  font-size: var(--text-4xl);\n  font-weight: 700;\n  font-variation-settings: \"opsz\" 144, \"SOFT\" 0;\n  line-height: var(--leading-tight);\n  letter-spacing: -0.025em;\n  color: var(--bark-800);\n  text-wrap: balance;\n}\nh2, .h2 {\n  font-family: var(--font-display);\n  font-size: var(--text-3xl);\n  font-weight: 700;\n  font-variation-settings: \"opsz\" 96, \"SOFT\" 0;\n  line-height: var(--leading-tight);\n  letter-spacing: -0.02em;\n  color: var(--bark-800);\n  text-wrap: balance;\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-size: var(--text-2xl);\n  font-weight: 600;\n  font-variation-settings: \"opsz\" 60, \"SOFT\" 25;\n  line-height: var(--leading-snug);\n  letter-spacing: -0.015em;\n  color: var(--bark-800);\n  text-wrap: balance;\n}\nh4, .h4 {\n  font-family: var(--font-display);\n  font-size: var(--text-xl);\n  font-weight: 600;\n  font-variation-settings: \"opsz\" 40, \"SOFT\" 50;\n  line-height: var(--leading-snug);\n  color: var(--bark-800);\n}\n.bisaya {\n  font-family: var(--font-display);\n  font-style: italic;\n  font-weight: 400;\n  font-variation-settings: \"opsz\" 48, \"SOFT\" 75;\n  color: var(--fg-muted);\n  letter-spacing: -0.005em;\n  text-wrap: balance;\n}\np { line-height: var(--leading-body); text-wrap: pretty; max-width: 64ch; }\n.lead { font-size: var(--text-md); color: var(--fg-muted); }\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-xs);\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--tag);\n}\ncode, .mono { font-family: var(--font-mono); font-size: 0.92em; }\na {\n  color: var(--link);\n  text-decoration: underline;\n  text-underline-offset: 3px;\n  text-decoration-thickness: 1.5px;\n}\na:hover { text-decoration-thickness: 2.5px; }\n<\u002Fstyle>\n\n<style>\n  :root {\n    --btn-back-gradient: linear-gradient(90deg, var(--mango-500), var(--terracotta), var(--coffee-900));\n    --btn-shift: 4px;\n    --btn-duration: 250ms;\n    --btn-ease: cubic-bezier(0.2, 0.7, 0.2, 1);\n    --container: 1200px;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  img { display: block; max-width: 100%; }\n  button { font-family: inherit; }\n\n  .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; }\n\n  /* ── Stacked button (matches live site) ───────────────── */\n  .btn {\n    position: relative; display: inline-flex; align-items: center; justify-content: center;\n    gap: 10px; padding: 13px 24px; border: none; background: transparent; cursor: pointer;\n    border-radius: var(--r-md); font-family: var(--font-body); font-weight: 600; font-size: 15px;\n    color: var(--cream-50); overflow: visible; isolation: isolate;\n    transition: color var(--btn-duration) var(--btn-ease);\n  }\n  .btn::before {\n    content: \"\"; position: absolute; inset: 0; z-index: -2; border-radius: inherit;\n    background: var(--btn-back-gradient); pointer-events: none;\n  }\n  .btn::after {\n    content: \"\"; position: absolute; inset: 0; z-index: -1; border-radius: inherit;\n    background: var(--coffee-900); border: 1px solid transparent; pointer-events: none;\n    transition: transform var(--btn-duration) var(--btn-ease),\n                background var(--btn-duration) var(--btn-ease),\n                border-color var(--btn-duration) var(--btn-ease);\n  }\n  .btn > * { position: relative; z-index: 1;\n    transition: transform var(--btn-duration) var(--btn-ease); }\n  .btn:hover::after, .btn:hover > * {\n    transform: translate(calc(var(--btn-shift) * -1), calc(var(--btn-shift) * -1));\n  }\n  .btn:hover { font-weight: 700; }\n  .btn:active::after, .btn:active > * { transform: translate(0); transition-duration: 120ms; }\n\n  .btn.terracotta::after { background: var(--terracotta); }\n  .btn.mango { color: var(--coffee-900); }\n  .btn.mango::after { background: var(--mango-500); }\n  .btn.inverse::after { background: var(--coffee-900); border-color: var(--coffee-900); }\n  .btn.inverse:hover { color: var(--coffee-900); }\n  .btn.inverse:hover::after { background: var(--cream-50); border-color: var(--coffee-900); }\n\n  /* ── Header ───────────────────────────────────────────── */\n  header.site {\n    position: sticky; top: 0; z-index: 50; backdrop-filter: blur(14px);\n    background: color-mix(in oklch, var(--cream-50) 78%, transparent);\n    border-bottom: 1px solid var(--border);\n  }\n  .site-inner {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 16px 32px; max-width: var(--container); margin: 0 auto;\n  }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .brand .mark {\n    width: 42px; height: 42px; border-radius: 50%; background: var(--mango-500);\n    color: var(--coffee-900); display: grid; place-items: center;\n    font-family: var(--font-display); font-weight: 800; font-size: 20px;\n  }\n  .brand .word { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; color: var(--coffee-800); }\n  nav.primary ul { display: flex; gap: 28px; list-style: none; margin: 0; padding: 0; }\n  nav.primary a {\n    color: var(--coffee-800); text-decoration: none; font-weight: 500; font-size: 14.5px;\n    padding: 6px 0; position: relative; transition: color var(--btn-duration);\n  }\n  nav.primary a::after {\n    content: \"\"; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px;\n    background: var(--accent); transform: scaleX(0); transform-origin: left;\n    transition: transform var(--btn-duration) var(--btn-ease);\n  }\n  nav.primary a:hover::after, nav.primary a.active::after { transform: scaleX(1); }\n  nav.primary a.active { color: var(--accent); }\n\n  /* ── Hero ─────────────────────────────────────────────── */\n  .hero { padding: 56px 0 48px; }\n  .hero-grid {\n    display: grid; grid-template-columns: 1fr 1.05fr; gap: 56px; align-items: center;\n  }\n  .hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--cream-100); border: 1px solid var(--border-strong); border-radius: var(--r-pill); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--coffee-800); }\n  .hero-eyebrow .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 60%, transparent); animation: pulse 2s var(--btn-ease) infinite; }\n  @keyframes pulse {\n    0% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--accent) 60%, transparent); }\n    70% { box-shadow: 0 0 0 10px transparent; }\n    100% { box-shadow: 0 0 0 0 transparent; }\n  }\n  .hero h1 {\n    font-family: var(--font-display); font-weight: 600; font-size: 72px; line-height: 1.02;\n    letter-spacing: -0.025em; color: var(--coffee-800); margin: 18px 0 14px;\n    font-variation-settings: \"opsz\" 96; text-wrap: balance;\n  }\n  .hero h1 .accent { color: var(--accent); font-style: italic; font-weight: 500; }\n  .hero .bs {\n    font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--fg-muted);\n    line-height: 1.3; max-width: 36ch; margin: 0 0 22px;\n  }\n  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }\n  .hero-stats { display: flex; gap: 32px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }\n  .stat .n { font-family: var(--font-display); font-weight: 600; font-size: 30px; color: var(--coffee-800); line-height: 1; letter-spacing: -0.015em; }\n  .stat .l { font-family: var(--font-m
